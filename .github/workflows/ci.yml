name: CI

on:
  pull_request:
    branches: ["main"]
  workflow_call:
    inputs:
      update_image_cache:
        description: "Set to true if the CI should update the Docker image cache"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  MAKE_JOBS: 2 # When building the Dockerfile, use 2 make jobs

jobs:
  code-validation:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Install the Rust toolchain from the toolchain.toml file.
      # This needs to manually be done before the rust cache is set up because
      # the cache is tied to the Rust version.
      - name: Install Rust toolchain
        run: rustup show
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Linting
        run: cargo clippy --locked -- -D warnings
      - name: Unit tests
        run: cargo test --bins --locked

  containerisation:
    timeout-minutes: 30
    needs: code-validation
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        if: ${{ inputs.update_image_cache }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Build full Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          target: ci-end-to-end
          load: true
          tags: ${{ vars.DOCKER_REPO }}:latest
          cache-from: type=registry,ref=${{ vars.DOCKER_REPO }}:buildcache
          cache-to: ${{ inputs.update_image_cache && format('type=registry,ref={0}:buildcache,mode=max', vars.DOCKER_REPO) || '' }}

      - name: Run end-to-end tests
        run: docker run -t ${{ vars.DOCKER_REPO }}:latest cargo test --tests --release --locked
